<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TSW5 Random Weather Scenario Generator - Generate random scenarios for Train Sim World 5">
    <meta name="theme-color" content="#0d1117">
    <title>TSW5 Random Weather Scenario</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1 id="page-title">🚂 TSW5 Random Weather Scenario</h1>
        <p id="page-subtitle">Generate random scenarios for Train Sim World 5</p>
    </header>

    <main>
        <!-- Scenario Display -->
        <div class="scenario-container">
            <div id="scenario-display" class="scenario-display">
                <div id="scenario-symbol" class="scenario-symbol">☀️ 🧑‍🤝‍🧑</div>
                <div class="scenario-details">
                    <div class="scenario-detail">
                        <span class="label">Date:</span>
                        <span id="scenario-date" class="value">-</span>
                    </div>
                    <div class="scenario-detail">
                        <span class="label">Weather:</span>
                        <span id="scenario-weather" class="value">-</span>
                    </div>
                    <div class="scenario-detail">
                        <span class="label">Route:</span>
                        <span id="scenario-route" class="value">-</span>
                    </div>
                    <div class="scenario-detail">
                        <span class="label">Mission:</span>
                        <span id="scenario-mission" class="value">-</span>
                    </div>
                    <div class="scenario-detail">
                        <span class="label">Time:</span>
                        <span id="scenario-time" class="value">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="control-row">
                <button id="generate-btn" class="btn btn-primary">
                    🎲 New Scenario
                </button>
                <button id="copy-btn" class="btn btn-secondary">
                    📋 Copy
                </button>
            </div>
            
            <div class="control-row">
                <div class="date-control">
                    <label for="date-input">📅 Date:</label>
                    <input type="date" id="date-input">
                </div>
                <button id="manage-routes-btn" class="btn btn-secondary">
                    🛤️ Manage Routes
                </button>
            </div>

            <!-- Region Filter -->
            <div class="control-row filter-row">
                <label for="region-filter">🌍 Region:</label>
                <select id="region-filter" class="region-select">
                    <option value="all">All Regions</option>
                    <option value="germany">🇩🇪 Germany</option>
                    <option value="uk">🇬🇧 United Kingdom</option>
                    <option value="usa">🇺🇸 USA</option>
                </select>
            </div>
        </div>

        <!-- Routes Info -->
        <div id="routes-info" class="routes-info">
            Lade Routen...
        </div>
    </main>

    <!-- Route Management Modal -->
    <div id="route-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🛤️ Manage Routes</h2>
                <button id="close-modal-btn" class="btn-icon" title="Close">✕</button>
            </div>
            
            <div class="modal-body">
                <div class="add-route-section">
                    <input type="text" id="new-route-input" placeholder="Add new route...">
                    <button id="add-route-btn" class="btn btn-primary">Add</button>
                </div>
                
                <div id="route-list" class="route-list">
                    <!-- Routes will be populated here -->
                </div>
            </div>
            
            <div class="modal-footer">
                <button id="reset-routes-btn" class="btn btn-secondary">🔄 Reset to Default</button>
                <button id="clear-routes-btn" class="btn btn-secondary" style="color: var(--accent-danger);">🗑️ Clear All</button>
            </div>
        </div>
    </div>

    <!-- Copy Status -->
    <div id="copy-status" class="copy-status"></div>

    <footer>
        <p>
            <a href="https://github.com/AloyVipa/tsw5-random-web" target="_blank" rel="noopener">
                GitHub: AloyVipa/tsw5-random-web
            </a>
        </p>
        <p>Version 1.0.0 • Made with ❤️ for TSW5 fans</p>
    </footer>

    <!-- Scripts -->
    <script src="js/language.js"></script>
    <script src="js/weather.js"></script>
    <script src="js/routes.js"></script>
    <script src="js/scenario.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
